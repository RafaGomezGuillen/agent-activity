<nav
  id="sidebar"
  class="h-lvh w-56 border-r border-[var(--border-color)] bg-[var(--bg-primary)] shrink-0"
>
  <!-- Logo -->
  <div
    class="flex items-center gap-3 px-5 py-5 h-16 border-b border-[var(--border-color)]"
  >
    <div
      class="w-8 h-8 rounded bg-[var(--bg-surface)] flex items-center justify-center"
    >
      <img
        [src]="themeService.isDark ? 'logo-dark.svg' : 'logo-light.svg'"
        alt="Logo"
        class="w-5 h-5 object-contain"
      />
    </div>
    <div>
      <div
        class="text-[var(--text-main)] font-bold text-sm tracking-wider font-mono"
      >
        Agent
      </div>
      <div class="text-[var(--text-muted)] text-xs font-mono">
        activity monitor
      </div>
    </div>
  </div>

  <!-- Nav Items -->
  <div class="flex flex-col gap-1 p-3 flex-1 overflow-y-auto">
    <ng-container *ngFor="let item of navItems">
      <a
        pTooltip="{{ item.label }}"
        tooltipPosition="right"
        [routerLink]="item.route"
        [routerLinkActiveOptions]="{ exact: item.exact || false }"
        routerLinkActive="active"
        (click)="onNavigate()"
        class="nav-item flex items-center gap-3 px-3 py-2.5 rounded cursor-pointer text-sm border-l-2 border-transparent no-underline"
      >
        <i [class]="item.icon" class="text-base w-4 text-center"></i>
        <span class="font-mono">{{ item.label }}</span>
      </a>
    </ng-container>
  </div>
</nav>
