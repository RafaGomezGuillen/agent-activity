<header
  id="topbar-container"
  class="flex items-center justify-between px-5 py-5 h-16 border-b border-[var(--border-color)] bg-[var(--bg-primary)] shrink-0"
>
  <div class="flex items-center gap-2">
    <div class="lg:hidden">
      <button
        pButton
        icon="pi pi-bars"
        class="p-button-text p-button-sm p-button-rounded"
        pTooltip="Open Menu"
        (click)="toggleSidebar.emit()"
      ></button>
    </div>
    <span class="text-[var(--text-main)] text-xs font-mono">SYS://</span>
    <span class="text-[var(--link-default)] text-xs font-mono">ACTIVE</span>
    <span class="w-2 h-2 rounded-full bg-[var(--success-text)] animate-pulse"></span>
  </div>

  <div class="flex items-center gap-3">
    <span
      class="text-[var(--text-main)] text-xs font-mono hidden md:block"
    >
      {{ themeService.isDark ? 'DARK_MODE' : 'LIGHT_MODE' }}
    </span>
    <button
      pButton
      [icon]="themeService.isDark ? 'pi pi-sun' : 'pi pi-moon'"
      class="p-button-text p-button-sm p-button-rounded"
      [pTooltip]="themeService.isDark ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
      (click)="themeService.toggle()"
    ></button>
  </div>
</header>
