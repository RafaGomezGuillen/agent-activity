<div
  class="rounded-lg border border-[var(--border-color)] bg-[var(--bg-card)] p-4 flex items-center gap-4"
>
  <div
    [class]="'w-12 h-12 rounded-lg flex items-center justify-center border ' + colorClasses.bg + ' ' + colorClasses.border"
  >
    <i [class]="icon + ' text-xl ' + colorClasses.text"></i>
  </div>
  <div>
    <div
      class="text-[var(--text-muted)] text-xs font-mono uppercase tracking-wider"
    >
      {{ label }}
    </div>
    <div class="text-[var(--text-main)] text-2xl font-bold font-mono mt-0.5">
      {{ value }}
    </div>
  </div>
</div>
