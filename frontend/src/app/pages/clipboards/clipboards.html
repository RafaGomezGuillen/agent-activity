<div class="min-h-full">
  <app-page-header
    title="Clipboards"
    subtitle="Global clipboard capture across all agents"
    breadcrumbRootLabel="home"
    breadcrumbRootLink="/"
    breadcrumbCurrent="clipboards"
  ></app-page-header>

  <!-- Filters -->
  <div
    class="rounded-lg border border-[var(--border-color)] bg-[var(--bg-card)] p-4 mb-6"
  >
    <div class="flex flex-col md:flex-row gap-3 items-end flex-wrap">
      <div class="w-full md:w-48">
        <label class="block text-[var(--text-muted)] text-xs font-mono mb-1.5"
          >AGENT</label
        >
        <p-select
          [(ngModel)]="agentFilter"
          [options]="agentOptions"
          optionLabel="label"
          optionValue="value"
          class="w-full"
          (onChange)="applyFilters()"
        ></p-select>
      </div>
      <div class="flex-1 w-full xs:min-w-36">
        <label class="block text-[var(--text-muted)] text-xs font-mono mb-1.5"
          >APPLICATION</label
        >
        <input
          pInputText
          [(ngModel)]="appFilter"
          placeholder="Filter by app..."
          class="w-full font-mono text-sm"
        />
      </div>
      <div class="flex-1 w-full xs:min-w-44">
        <label class="block text-[var(--text-muted)] text-xs font-mono mb-1.5"
          >DATE RANGE</label
        >
        <p-datepicker
          [(ngModel)]="dateRange"
          selectionMode="range"
          [showIcon]="true"
          placeholder="Select range"
          class="w-full"
          dateFormat="yy-mm-dd"
        ></p-datepicker>
      </div>
      <div class="flex flex-1 gap-2 justify-end h-10">
        <button
          pButton
          label="Apply"
          icon="pi pi-filter"
          class="p-button-sm p-button-outlined"
          (click)="applyFilters()"
        ></button>
        <button
          pButton
          label="Clear"
          icon="pi pi-times"
          class="p-button-sm p-button-text"
          (click)="clearFilters()"
        ></button>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div
    class="rounded-lg border border-[var(--border-color)] bg-[var(--bg-card)] overflow-hidden"
  >
    <div class="px-5 py-4 border-b border-[var(--border-color)]">
      <span class="text-[var(--text-muted)] text-xs font-mono"
        >{{ total }} records</span
      >
    </div>

    <div *ngIf="loading" class="p-5 space-y-3">
      <p-skeleton height="2.5rem" *ngFor="let i of [1,2,3,4,5]"></p-skeleton>
    </div>

    <p-table *ngIf="!loading" [value]="clipboards" styleClass="p-datatable-sm">
      <ng-template pTemplate="header">
        <tr class="text-[var(--text-muted)] text-xs font-mono uppercase">
          <th style="width: 160px">Timestamp</th>
          <th style="width: 160px">Agent</th>
          <th style="width: 140px">Application</th>
          <th>Value</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-item>
        <tr>
          <td>
            {{ item.timestamp | date:'medium' }}
          </td>
          <td>
            <a
              [routerLink]="['/agents', item.agent_id]"
              pTooltip="View details for {{ getAgentHostname(item.agent_id) }}"
              class="link"
            >
              {{ getAgentHostname(item.agent_id) }}
            </a>
          </td>
          <td>
            <span
              class="text-xs span-accent"
              >{{ item.app || '—' }}</span
            >
          </td>
          <td
            class="font-mono text-sm text-[var(--text-main)] max-w-0 truncate cursor-pointer"
            style="max-width: 400px"
            pTooltip="Full clipboard content"
            (click)="openDialog(item)"
            [title]="item.value"
          >
            {{ item.value || '—' }}
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td
            colspan="4"
            style="text-align: center !important; padding: 12px !important"
            class="text-[var(--text-muted)] font-mono text-sm"
          >
            No clipboard entries found.
          </td>
        </tr>
      </ng-template>
    </p-table>

    <div
      *ngIf="!loading && total > limit"
      class="p-3 border-t border-[var(--border-color)] flex justify-center"
    >
      <p-paginator
        [first]="offset"
        [rows]="limit"
        [totalRecords]="total"
        [rowsPerPageOptions]="[25,50,100]"
        (onPageChange)="onPageChange($event)"
      ></p-paginator>
    </div>
  </div>
</div>

<!-- Dialog -->
<p-dialog
  header="Clipboard Content"
  [(visible)]="dialogVisible"
  [modal]="true"
  [closable]="true"
  [resizable]="false"
  [draggable]="false"
  [style]="{width: '90vw', maxWidth: '600px'}"
  (onHide)="closeDialog()"
>
  <div
    class="border-[var(--border-color)] border rounded p-4 bg-[var(--bg-primary)]"
  >
    <pre
      class="h-full text-xs font-mono text-[var(--text-main)] whitespace-pre-wrap break-words"
    >
{{ selectedClipboard?.value }}</pre
    >
  </div>
</p-dialog>
