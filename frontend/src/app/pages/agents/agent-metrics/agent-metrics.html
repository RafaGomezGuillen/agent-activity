<div class="min-h-full">
  <app-page-header
    title="Metrics"
    subtitle="System performance data"
    breadcrumbRootLabel="agents"
    breadcrumbRootLink="/agents"
    [breadcrumbMiddleLabel]="agent?.hostname || agentId"
    [breadcrumbMiddleLink]="['/agents', agentId]"
    breadcrumbCurrent="metrics"
  ></app-page-header>

  <!-- Filters -->
  <div class="rounded-lg border border-[var(--border-color)] bg-[var(--bg-card)] p-4 mb-6">
    <div class="flex flex-col md:flex-row gap-3 items-end">
      <div class="flex-1">
        <label class="block text-[var(--text-muted)] text-xs font-mono mb-1.5">DATE RANGE</label>
        <p-datepicker [(ngModel)]="dateRange" selectionMode="range" [showIcon]="true" placeholder="Select range" class="w-full" dateFormat="yy-mm-dd"></p-datepicker>
      </div>
      <div class="w-36">
        <label class="block text-[var(--text-muted)] text-xs font-mono mb-1.5">LIMIT</label>
        <input pInputText type="number" [(ngModel)]="limit" class="w-full font-mono text-sm" />
      </div>
      <div class="flex gap-2">
        <button pButton label="Load" icon="pi pi-refresh" class="p-button-sm p-button-outlined" (click)="applyFilters()"></button>
        <button pButton label="Clear" icon="pi pi-times" class="p-button-sm p-button-text" (click)="clearFilters()"></button>
      </div>
    </div>
    <!-- Toggle Metrics -->
    <div class="flex gap-2 mt-3 flex-wrap">
      <button pButton [label]="'CPU'" icon="pi pi-microchip"
        [class]="showCpu ? 'p-button-sm' : 'p-button-sm p-button-outlined'"
        (click)="toggleMetric('cpu')"></button>
      <button pButton [label]="'Memory'" icon="pi pi-server"
        [class]="showMemory ? 'p-button-sm p-button-success' : 'p-button-sm p-button-outlined'"
        (click)="toggleMetric('memory')"></button>
      <button pButton [label]="'Disk'" icon="pi pi-save"
        [class]="showDisk ? 'p-button-sm p-button-warning' : 'p-button-sm p-button-outlined'"
        (click)="toggleMetric('disk')"></button>
    </div>
  </div>

  <!-- Latest Stats -->
  <div *ngIf="latestMetric() as latest" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
    <app-stat-card label="CPU" [value]="latest.cpu_usage.toFixed(1) + '%'" icon="pi pi-microchip" color="cyan"></app-stat-card>
    <app-stat-card label="Memory" [value]="latest.memory_used_percent.toFixed(1) + '%'" icon="pi pi-server" color="emerald"></app-stat-card>
    <app-stat-card label="Disk" [value]="latest.disk_used_percent.toFixed(1) + '%'" icon="pi pi-save" color="amber"></app-stat-card>
    <app-stat-card label="Processes" [value]="latest.process_count" icon="pi pi-list" color="purple"></app-stat-card>
  </div>

  <div *ngIf="loading" class="space-y-4">
    <p-skeleton height="16rem"></p-skeleton>
    <p-skeleton height="12rem"></p-skeleton>
  </div>

  <ng-container *ngIf="!loading">
    <!-- CPU / Memory / Disk Chart -->
    <div class="rounded-lg border border-[var(--border-color)] bg-[var(--bg-card)] p-5 mb-6">
      <h3 class="text-cyan-400 font-mono text-xs uppercase tracking-wider mb-4 flex items-center gap-2">
        <i class="pi pi-chart-line"></i> System Resources ({{ total }} samples)
      </h3>
      <div *ngIf="metrics.length === 0" class="h-48 flex items-center justify-center">
        <p class="text-[var(--text-muted)] font-mono text-sm">No data available.</p>
      </div>
      <div *ngIf="metrics.length > 0" style="height: 280px;">
        <p-chart type="line" [data]="chartData" [options]="chartOptions" height="280px"></p-chart>
      </div>
    </div>

    <!-- Network Chart -->
    <div class="rounded-lg border border-[var(--border-color)] bg-[var(--bg-card)] p-5">
      <h3 class="text-cyan-400 font-mono text-xs uppercase tracking-wider mb-4 flex items-center gap-2">
        <i class="pi pi-arrows-h"></i> Network Speed
      </h3>
      <div *ngIf="metrics.length > 0" style="height: 200px;">
        <p-chart type="line" [data]="networkChartData" [options]="networkChartOptions" height="200px"></p-chart>
      </div>
    </div>
  </ng-container>
</div>
