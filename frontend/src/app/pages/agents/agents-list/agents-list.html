<div class="min-h-full">
  <app-page-header
    title="Agents"
    subtitle="All registered agents in the network"
    breadcrumbRootLabel="home"
    breadcrumbRootLink="/"
    breadcrumbCurrent="agents"
  ></app-page-header>

  <!-- Filters -->
  <div class="rounded-lg border border-[var(--border-color)] bg-[var(--bg-card)] p-4 mb-6">
    <div class="flex flex-col lg:flex-row gap-3 items-end">
      <div class="flex-1 w-full lg:min-w-44">
        <label class="block text-[var(--text-muted)] text-xs font-mono mb-1.5">SEARCH</label>
        <p-iconfield class="w-full">
          <p-inputicon styleClass="pi pi-search" />
          <input
            pInputText
            [(ngModel)]="search"
            placeholder="hostname, IP, MAC..."
            class="w-full font-mono text-sm"
            (keyup.enter)="applyFilters()"
          />
        </p-iconfield>
      </div>
      <div class="w-full lg:w-44">
        <label class="block text-[var(--text-muted)] text-xs font-mono mb-1.5">OS</label>
        <p-select
          [(ngModel)]="osFilter"
          [options]="osOptions"
          optionLabel="label"
          optionValue="value"
          class="w-full"
          (onChange)="applyFilters()"
        ></p-select>
      </div>
      <div class="w-full lg:w-44">
        <label class="block text-[var(--text-muted)] text-xs font-mono mb-1.5">STATUS</label>
        <p-select
          [(ngModel)]="statusFilter"
          [options]="statusOptions"
          optionLabel="label"
          optionValue="value"
          class="w-full"
          (onChange)="applyFilters()"
        ></p-select>
      </div>
      <div class="flex flex-1 gap-2 justify-end h-10">
        <button pButton label="Apply" icon="pi pi-filter" class="p-button-sm p-button-outlined" (click)="applyFilters()"></button>
        <button pButton label="Clear" icon="pi pi-times" class="p-button-sm p-button-text" (click)="clearFilters()"></button>
      </div>
    </div>
  </div>

  <!-- Skeleton loader -->
  <div *ngIf="loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
    <div *ngFor="let i of [1,2,3,4,5,6,7,8]" class="rounded-lg border border-[var(--border-color)] bg-[var(--bg-card)] p-4">
      <p-skeleton height="1rem" class="mb-3"></p-skeleton>
      <p-skeleton height="0.75rem" class="mb-2"></p-skeleton>
      <p-skeleton height="0.75rem" width="60%"></p-skeleton>
    </div>
  </div>

  <!-- Agent Cards -->
  <div *ngIf="!loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
    <a
      *ngFor="let agent of agents"
      [routerLink]="['/agents', agent.id]"
      pTooltip="View details for {{ agent.hostname }}"
      class="block rounded-lg border border-[var(--border-color)] bg-[var(--bg-card)] p-4 hover:border-cyan-500/40 hover:bg-cyan-500/5 transition-all cursor-pointer no-underline group"
    >
      <div class="flex items-start justify-between mb-3">
        <div class="flex items-center gap-2">
          <i class="pi pi-server text-cyan-400 text-lg"></i>
          <span class="text-[var(--text-primary)] font-mono font-semibold text-sm truncate">{{ agent.hostname }}</span>
        </div>
        <app-status-badge [online]="agent.status"></app-status-badge>
      </div>

      <div class="space-y-1.5 text-xs font-mono">
        <div class="flex items-center gap-2 text-[var(--text-secondary)]">
          <i class="pi pi-globe text-[var(--text-muted)] w-3"></i>
          <span>{{ agent.ip_address }}</span>
        </div>
        <div class="flex items-center gap-2 text-[var(--text-secondary)]">
          <i class="pi pi-link text-[var(--text-muted)] w-3"></i>
          <span class="truncate">{{ agent.mac_address }}</span>
        </div>
        <div class="flex items-center gap-2 text-[var(--text-secondary)]">
          <i class="pi pi-desktop text-[var(--text-muted)] w-3"></i>
          <span>{{ agent.os }} {{ agent.os_release }}</span>
        </div>
      </div>

      <div class="mt-3 pt-3 border-t border-[var(--border-color)] flex justify-between items-center">
        <span class="text-[var(--text-muted)] text-xs font-mono">{{ agent.last_seen | date:'short' }}</span>
        <i class="pi pi-arrow-right text-cyan-400/40 group-hover:text-cyan-400 transition-colors"></i>
      </div>
    </a>

    <div *ngIf="agents.length === 0" class="col-span-full text-center py-16">
      <i class="pi pi-server text-4xl text-[var(--text-muted)] mb-4 block"></i>
      <p class="text-[var(--text-muted)] font-mono">No agents found.</p>
    </div>
  </div>

  <!-- Pagination -->
  <div *ngIf="!loading && total > size" class="mt-6 flex justify-center">
    <p-paginator
      [first]="(page - 1) * size"
      [rows]="size"
      [totalRecords]="total"
      [rowsPerPageOptions]="[12, 24, 48]"
      (onPageChange)="onPageChange($event)"
    ></p-paginator>
  </div>
</div>
